name: Mise à jour quotidienne

on:
  schedule:
    # 07h00 UTC = 09h00 heure française en été, 08h00 en hiver
    - cron: '0 7 * * *'
  workflow_dispatch:  # permet aussi un déclenchement manuel depuis l'onglet Actions

permissions:
  contents: write   # pour committer data/quotidien.csv et docs/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Téléchargement données du jour
        run: python download.py

      - name: Génération du tableau de bord
        run: python dashboard.py

      - name: Commit des fichiers à jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/quotidien.csv docs/index.html
          if git diff --staged --quiet; then
            echo "Aucun changement à committer."
            exit 0
          fi
          git commit -m "MAJ quotidienne $(date -u +%Y-%m-%d)"
          # Retry pour gérer le cas où un autre push a eu lieu pendant le job
          for tentative in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push refusé (tentative $tentative) — rebase puis nouvelle tentative."
            git pull --rebase --autostash origin main
          done
          echo "Échec du push après 3 tentatives." >&2
          exit 1
